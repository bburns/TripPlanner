<div class="itinerary">
  <div class="itinerary-title well well-sm">
    Itinerary
  </div>
  <div class="itinerary-list list-group" cdkDropList (cdkDropListDropped)="_dropItem($event)">
    <a href="#" class="list-group-item" *ngFor="let place of places; let i = index;" cdkDrag cdkDragLockAxis="y">
      {{place.name}}
      <!-- <div *cdkDragPlaceholder>pokpok</div> -->
      <div class="list-group-item" *cdkDragPreview>{{place.name}}</div>
      <!-- <a href="#" (click)="_clickRemove(i)" class="itinerary-delete">x</a> -->
      <button type="button" class="close" aria-label="Close" (click)="_clickRemove(i)">
        <span aria-hidden="true">&times;</span>
      </button>
    </a>
  </div>
  <!-- <button type="button" class="btn btn-primary btn-block btn-lg" (click)="onClickAdd()">
    Add Place
  </button> -->
</div>
