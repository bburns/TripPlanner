<app-header [title]="title" (addPlace)="handleAddPlace($event)"></app-header>
<app-itinerary [places]="places" (removePlace)=[handleRemovePlace($event)]></app-itinerary>

  (setCurrentPlace)="handleSetCurrentPlace($event)"
  (addPlace)="handleAddPlace($event)" 
  (removePlace)="handleRemovePlace($event)" 
>
</app-map>
